name: Staging Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Staging에 배포할 검증된 branch 또는 commit SHA"
        required: true
        type: string

concurrency:
  group: staging
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: staging
    steps:
      - name: Refuse unsafe Staging ref
        shell: bash
        env:
          DEPLOY_REF: ${{ inputs.ref }}
        run: |
          test -n "${DEPLOY_REF:-}"
          case "$DEPLOY_REF" in
            main|refs/heads/main|origin/main|refs/remotes/origin/main)
              echo "Staging deployment from main is not allowed"
              exit 1
              ;;
          esac

      - name: Check out selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Check JavaScript syntax
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find . -type f \( -name '*.js' -o -name '*.mjs' -o -name '*.cjs' \) -not -path './node_modules/*' -print0)

      - name: Generate isolated Staging Wrangler config
        shell: bash
        env:
          STAGING_USERS_KV_ID: ${{ secrets.CLOUDFLARE_STAGING_USERS_KV_ID }}
          STAGING_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_STAGING_D1_DATABASE_ID }}
        run: |
          test -n "${STAGING_USERS_KV_ID:-}"
          test "$STAGING_USERS_KV_ID" != "null"
          test -n "${STAGING_D1_DATABASE_ID:-}"
          test "$STAGING_D1_DATABASE_ID" != "null"
          echo "::add-mask::$STAGING_USERS_KV_ID"
          echo "::add-mask::$STAGING_D1_DATABASE_ID"

          generated_config="$GITHUB_WORKSPACE/wrangler.staging.generated.jsonc"
          jq --arg kv_id "$STAGING_USERS_KV_ID" --arg d1_id "$STAGING_D1_DATABASE_ID" '
            .kv_namespaces = [{"binding":"USERS_KV","id":$kv_id}] |
            .d1_databases = [{
              "binding":"BILLING_DB",
              "database_name":"on-my-way-billing-staging",
              "database_id":$d1_id,
              "migrations_dir":"migrations"
            }] |
            .assets.exclude = ((.assets.exclude // []) + ["wrangler.staging.generated.jsonc"])
          ' wrangler.staging.jsonc > "$generated_config"

          jq -e '
            (.name == "on-my-way-staging") and
            (.vars.APP_ENV == "staging") and
            (.vars.PAYMENTS_ENABLED == "false") and
            (.kv_namespaces | length == 1) and
            (.kv_namespaces[0].binding == "USERS_KV") and
            (.d1_databases | length == 1) and
            (.d1_databases[0].binding == "BILLING_DB") and
            (.d1_databases[0].database_name == "on-my-way-billing-staging")
          ' "$generated_config" > /dev/null

      - name: Apply Staging D1 migrations before deploy
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          STAGING_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_STAGING_D1_DATABASE_ID }}
        run: |
          test -n "${STAGING_D1_DATABASE_ID:-}"
          test "$STAGING_D1_DATABASE_ID" != "null"
          echo "::add-mask::$STAGING_D1_DATABASE_ID"
          npx --yes wrangler@4.81.0 d1 migrations apply on-my-way-billing-staging \
            --remote \
            --config wrangler.staging.generated.jsonc

      - name: Verify Staging D1 billing schema
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          STAGING_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_STAGING_D1_DATABASE_ID }}
        run: |
          test -n "${STAGING_D1_DATABASE_ID:-}"
          test "$STAGING_D1_DATABASE_ID" != "null"
          echo "::add-mask::$STAGING_D1_DATABASE_ID"
          schema_file="$RUNNER_TEMP/staging-billing-schema.json"
          npx --yes wrangler@4.81.0 d1 execute on-my-way-billing-staging \
            --remote \
            --config wrangler.staging.generated.jsonc \
            --command "SELECT name FROM sqlite_master WHERE type = 'table' AND name IN ('billing_accounts', 'billing_orders', 'billing_events') ORDER BY name" \
            --json > "$schema_file"
          SCHEMA_FILE="$schema_file" node <<'NODE'
          const fs = require("node:fs");
          const payload = JSON.parse(fs.readFileSync(process.env.SCHEMA_FILE, "utf8"));
          const rows = (Array.isArray(payload) ? payload : [payload]).flatMap((item) => Array.isArray(item.results) ? item.results : []);
          const names = new Set(rows.map((row) => row.name));
          for (const required of ["billing_accounts", "billing_orders", "billing_events"]) {
            if (!names.has(required)) throw new Error(`Missing Staging billing table: ${required}`);
          }
          NODE

      - name: Deploy isolated Staging Worker
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.81.0"
          command: deploy --config wrangler.staging.generated.jsonc

      - name: Wait for stable Staging endpoints
        env:
          STAGING_URL: ${{ steps.deploy.outputs.deployment-url }}
        shell: bash
        run: |
          test -n "$STAGING_URL"
          consecutive=0
          last_endpoint=""
          last_status=""
          last_content_type=""

          probe_endpoint() {
            local endpoint="$1"
            local result status content_type
            result="$(curl --silent --output /dev/null --write-out '%{http_code}\t%{content_type}' --max-time 15 "$STAGING_URL$endpoint" 2>/dev/null || true)"
            status="${result%%$'\t'*}"
            content_type="${result#*$'\t'}"

            if [[ "$status" == "200" ]]; then
              case "$endpoint" in
                /plan-policy.mjs)
                  [[ "${content_type,,}" == *javascript* ]] && return 0
                  ;;
                /api/auth/providers|/api/health)
                  [[ "${content_type,,}" == application/json* ]] && return 0
                  ;;
              esac
            fi

            last_endpoint="$endpoint"
            last_status="$status"
            last_content_type="$content_type"
            return 1
          }

          for attempt in $(seq 1 24); do
            all_ready=true
            for endpoint in /plan-policy.mjs /api/auth/providers /api/health; do
              if ! probe_endpoint "$endpoint"; then
                all_ready=false
              fi
            done

            if [[ "$all_ready" == true ]]; then
              consecutive=$((consecutive + 1))
              if (( consecutive >= 2 )); then
                break
              fi
            else
              consecutive=0
            fi

            if (( attempt < 24 )); then
              sleep 5
            fi
          done

          if (( consecutive < 2 )); then
            echo "Staging readiness failed: endpoint=$last_endpoint status=$last_status content-type=$last_content_type"
            exit 1
          fi

      - name: Verify Staging routes and disabled billing
        env:
          STAGING_URL: ${{ steps.deploy.outputs.deployment-url }}
        shell: bash
        run: |
          test -n "$STAGING_URL"
          curl --fail --silent --show-error "$STAGING_URL/api/auth/providers" -o providers.json
          curl --fail --silent --show-error "$STAGING_URL/api/health" -o health.json
          node <<'NODE'
          const fs = require("node:fs");
          const health = JSON.parse(fs.readFileSync("health.json", "utf8"));
          if (health.environment !== "staging" || !health.services.accountStorage || health.services.payments !== false) {
            throw new Error("Staging environment or disabled billing policy is invalid");
          }
          const providers = JSON.parse(fs.readFileSync("providers.json", "utf8"));
          if (!Array.isArray(providers.providers)) throw new Error("Staging provider response is invalid");
          NODE

      - name: Remove generated Staging config
        if: always()
        shell: bash
        run: rm -f "$GITHUB_WORKSPACE/wrangler.staging.generated.jsonc" health.json providers.json "$RUNNER_TEMP/staging-billing-schema.json"
