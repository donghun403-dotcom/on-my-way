name: Staging Toss Reconcile Once

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Reviewed PR #10 commit to inspect"
        required: true
        type: string
      confirmation:
        description: "Exact confirmation for one read-only reconciliation"
        required: true
        type: string

concurrency:
  group: staging
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    environment: staging
    steps:
      - name: Refuse unsafe reconciliation request
        shell: bash
        env:
          INSPECT_REF: ${{ inputs.ref }}
          CONFIRMATION: ${{ inputs.confirmation }}
          WORKFLOW_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          expected_ref="8327e17e0626b1a336bc222f4c3f104dbe68b128"
          expected_workflow_ref="refs/heads/ci/staging-toss-reconcile-once"
          expected_confirmation="READ_ONLY_RECONCILE_FAILED_ORDER_ONCE"

          [[ "$INSPECT_REF" == "$expected_ref" ]] || {
            echo "Reconciliation requires the reviewed PR #10 commit"
            exit 1
          }
          [[ "$WORKFLOW_REF" == "$expected_workflow_ref" ]] || {
            echo "Reconciliation must run from its isolated temporary branch"
            exit 1
          }
          [[ "$CONFIRMATION" == "$expected_confirmation" ]] || {
            echo "Read-only reconciliation confirmation did not match"
            exit 1
          }

      - name: Check out selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Validate read-only Staging credentials
        shell: bash
        env:
          TOSS_SECRET_KEY: ${{ secrets.TOSS_SECRET_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          STAGING_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_STAGING_D1_DATABASE_ID }}
        run: |
          set -euo pipefail
          missing=()
          for secret_name in TOSS_SECRET_KEY CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID STAGING_D1_DATABASE_ID; do
            value="${!secret_name:-}"
            if [[ -z "$value" ]]; then
              missing+=("$secret_name")
            else
              echo "::add-mask::$value"
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required Staging secret name: %s\n' "${missing[@]}"
            exit 1
          fi
          [[ "$TOSS_SECRET_KEY" == test_sk_* ]] || {
            echo "tossTestSecret=false"
            exit 1
          }
          echo "tossTestSecret=true"

      - name: Generate read-only Staging Wrangler config
        shell: bash
        env:
          STAGING_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_STAGING_D1_DATABASE_ID }}
          GENERATED_CONFIG: ${{ runner.temp }}/wrangler.staging.reconcile.jsonc
        run: |
          set -euo pipefail
          echo "::add-mask::$STAGING_D1_DATABASE_ID"
          jq -e '
            (.name == "on-my-way-staging") and
            (.workers_dev == true) and
            ((.routes // []) | length == 0) and
            (.vars.APP_ENV == "staging") and
            (.vars.PAYMENTS_ENABLED == "false")
          ' wrangler.staging.jsonc > /dev/null

          jq --arg d1_id "$STAGING_D1_DATABASE_ID" '
            .d1_databases = [{
              "binding":"BILLING_DB",
              "database_name":"on-my-way-billing-staging",
              "database_id":$d1_id,
              "migrations_dir":"migrations"
            }] |
            .vars.PAYMENTS_ENABLED = "false"
          ' wrangler.staging.jsonc > "$GENERATED_CONFIG"

          jq -e '
            (.name == "on-my-way-staging") and
            ((.routes // []) | length == 0) and
            (.vars.APP_ENV == "staging") and
            (.vars.PAYMENTS_ENABLED == "false") and
            (.d1_databases | length == 1) and
            (.d1_databases[0].binding == "BILLING_DB") and
            (.d1_databases[0].database_name == "on-my-way-billing-staging")
          ' "$GENERATED_CONFIG" > /dev/null

      - name: Verify disabled environment boundaries before reconciliation
        shell: bash
        env:
          STAGING_HEALTH_FILE: ${{ runner.temp }}/staging-health-before.json
          PRODUCTION_HEALTH_FILE: ${{ runner.temp }}/production-health-before.json
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --max-time 30 \
            --output "$STAGING_HEALTH_FILE" \
            "https://on-my-way-staging.jungslawyer.workers.dev/api/health"
          curl --fail --silent --show-error --max-time 30 \
            --output "$PRODUCTION_HEALTH_FILE" \
            "https://onmyway.olivenrich.com/api/health"
          node <<'NODE'
          const fs = require("node:fs");
          const staging = JSON.parse(fs.readFileSync(process.env.STAGING_HEALTH_FILE, "utf8"));
          const production = JSON.parse(fs.readFileSync(process.env.PRODUCTION_HEALTH_FILE, "utf8"));
          if (staging.environment !== "staging") throw new Error("Staging environment boundary is invalid");
          if (staging.services?.accountStorage !== true) throw new Error("Staging account storage is unavailable");
          if (staging.services?.payments !== false) throw new Error("Staging payments must remain disabled");
          if (production.services?.payments !== false) throw new Error("Production payments must remain disabled");
          console.log("environment=staging");
          console.log("accountStorage=true");
          console.log("stagingPayments=false");
          console.log("productionPayments=false");
          NODE

      - name: Select the single failed Staging order without mutation
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          STAGING_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_STAGING_D1_DATABASE_ID }}
          GENERATED_CONFIG: ${{ runner.temp }}/wrangler.staging.reconcile.jsonc
          D1_QUERY_FILE: ${{ runner.temp }}/staging-order-selection.raw.json
          SELECTION_FILE: ${{ runner.temp }}/staging-order-selection.internal.json
          BASELINE_FILE: ${{ runner.temp }}/staging-ledger-baseline.safe.json
        run: |
          set -euo pipefail
          echo "::add-mask::$CLOUDFLARE_API_TOKEN"
          echo "::add-mask::$CLOUDFLARE_ACCOUNT_ID"
          echo "::add-mask::$STAGING_D1_DATABASE_ID"

          npx --yes wrangler@4.81.0 d1 execute on-my-way-billing-staging \
            --remote \
            --config "$GENERATED_CONFIG" \
            --command "SELECT o.order_id, o.customer_key, o.user_id, (SELECT COUNT(*) FROM billing_orders WHERE status = 'failed' AND purpose = 'initial_subscription' AND amount = 4900 AND currency = 'KRW' AND payment_key IS NULL AND failure_code = 'PAYMENT_AMOUNT_MISMATCH') AS matching_orders, (SELECT COUNT(*) FROM billing_orders WHERE status = 'succeeded') AS succeeded_orders, (SELECT COUNT(*) FROM billing_orders WHERE status IN ('created', 'pending', 'unknown')) AS active_orders, (SELECT COUNT(*) FROM billing_accounts a WHERE a.user_id = o.user_id AND a.billing_key_fingerprint IS NOT NULL) AS linked_fingerprinted_accounts, (SELECT COUNT(*) FROM billing_accounts) AS accounts, (SELECT COUNT(*) FROM billing_orders) AS orders, (SELECT COUNT(*) FROM billing_orders WHERE status = 'failed') AS failed_orders, (SELECT COUNT(*) FROM billing_orders WHERE payment_key IS NOT NULL) AS payment_key_orders, (SELECT COUNT(*) FROM billing_events) AS events FROM billing_orders o WHERE o.status = 'failed' AND o.purpose = 'initial_subscription' AND o.amount = 4900 AND o.currency = 'KRW' AND o.payment_key IS NULL AND o.failure_code = 'PAYMENT_AMOUNT_MISMATCH'" \
            --json > "$D1_QUERY_FILE"

          node <<'NODE'
          const fs = require("node:fs");
          const payload = JSON.parse(fs.readFileSync(process.env.D1_QUERY_FILE, "utf8"));
          const rows = (Array.isArray(payload) ? payload : [payload])
            .flatMap((item) => Array.isArray(item.results) ? item.results : []);
          if (rows.length !== 1) throw new Error("Expected exactly one matching failed Staging order");
          const row = rows[0];
          const counts = Object.fromEntries([
            "matching_orders",
            "succeeded_orders",
            "active_orders",
            "linked_fingerprinted_accounts",
            "accounts",
            "orders",
            "failed_orders",
            "payment_key_orders",
            "events",
          ].map((key) => [key, Number(row[key])]));
          for (const [key, value] of Object.entries(counts)) {
            if (!Number.isInteger(value) || value < 0) throw new Error(`Invalid read-only count: ${key}`);
          }
          if (counts.matching_orders !== 1) throw new Error("Matching failed order count is not one");
          if (counts.succeeded_orders !== 0) throw new Error("A succeeded Staging order exists; refusing Toss lookup");
          if (counts.active_orders !== 0) throw new Error("A non-terminal Staging order exists; refusing Toss lookup");
          if (counts.linked_fingerprinted_accounts !== 1) throw new Error("Linked billing account fingerprint is missing");
          if (
            counts.accounts !== 1 ||
            counts.orders !== 1 ||
            counts.failed_orders !== 1 ||
            counts.payment_key_orders !== 0 ||
            counts.events !== 3
          ) throw new Error("Staging billing ledger baseline differs from the reviewed state");
          for (const key of ["order_id", "customer_key", "user_id"]) {
            if (typeof row[key] !== "string" || row[key].length === 0) throw new Error(`Missing internal field: ${key}`);
          }
          fs.writeFileSync(process.env.SELECTION_FILE, JSON.stringify({
            orderId: row.order_id,
            customerKey: row.customer_key,
            userId: row.user_id,
          }), { mode: 0o600 });
          fs.writeFileSync(process.env.BASELINE_FILE, JSON.stringify({
            accounts: counts.accounts,
            orders: counts.orders,
            failed: counts.failed_orders,
            succeeded: counts.succeeded_orders,
            paymentKeys: counts.payment_key_orders,
            events: counts.events,
          }), { mode: 0o600 });
          console.log("matchingFailedOrders=1");
          console.log("succeededOrders=0");
          console.log("activeOrders=0");
          console.log("linkedFingerprint=true");
          NODE

      - name: Reconcile the failed order with one Toss GET
        shell: bash
        env:
          TOSS_SECRET_KEY: ${{ secrets.TOSS_SECRET_KEY }}
          SELECTION_FILE: ${{ runner.temp }}/staging-order-selection.internal.json
          TOSS_RESPONSE_FILE: ${{ runner.temp }}/toss-order-response.internal.json
        run: |
          set -euo pipefail
          echo "::add-mask::$TOSS_SECRET_KEY"
          order_id="$(node -e 'const fs=require("node:fs");process.stdout.write(JSON.parse(fs.readFileSync(process.env.SELECTION_FILE,"utf8")).orderId)')"
          encoded_order_id="$(ORDER_ID="$order_id" node -e 'process.stdout.write(encodeURIComponent(process.env.ORDER_ID))')"
          authorization="$(printf '%s:' "$TOSS_SECRET_KEY" | base64 | tr -d '\n')"
          echo "::add-mask::$order_id"
          echo "::add-mask::$authorization"
          api_url="https://api.tosspayments.com/v1/payments/orders/$encoded_order_id"

          curl_exit=0
          http_status="$(curl --silent --show-error \
            --request GET \
            --max-time 60 \
            --retry 0 \
            --header "Authorization: Basic $authorization" \
            --header "Accept: application/json" \
            --output "$TOSS_RESPONSE_FILE" \
            --write-out '%{http_code}' \
            "$api_url")" || curl_exit=$?

          unset authorization api_url encoded_order_id order_id
          if (( curl_exit != 0 )); then
            http_status="000"
            : > "$TOSS_RESPONSE_FILE"
          fi

          HTTP_STATUS="$http_status" node <<'NODE'
          const fs = require("node:fs");
          const httpStatus = Number(process.env.HTTP_STATUS) || 0;
          const selection = JSON.parse(fs.readFileSync(process.env.SELECTION_FILE, "utf8"));
          let body = null;
          try {
            body = JSON.parse(fs.readFileSync(process.env.TOSS_RESPONSE_FILE, "utf8"));
          } catch {
            body = null;
          }

          const safeToken = (value, fallback = "unknown") => {
            const text = String(value ?? "");
            return /^[A-Za-z0-9_.-]{1,64}$/.test(text) ? text : fallback;
          };

          console.log(`httpStatus=${httpStatus || "transport_error"}`);
          if (httpStatus === 200 && body && typeof body === "object") {
            const status = safeToken(body.status);
            const type = safeToken(body.type);
            const currency = safeToken(body.currency);
            const totalAmount = Number(body.totalAmount);
            const paymentKeyPresent = typeof body.paymentKey === "string" && body.paymentKey.length > 0;
            const orderIdMatches = body.orderId === selection.orderId;
            const customerKeyState = body.customerKey === undefined
              ? "field_missing"
              : String(body.customerKey === selection.customerKey);
            const approvedAtPresent = typeof body.approvedAt === "string" && body.approvedAt.length > 0;
            const cardPresent = Boolean(body.card && typeof body.card === "object");
            const cancelCount = Array.isArray(body.cancels) ? body.cancels.length : 0;
            const failurePresent = Boolean(body.failure);
            console.log("paymentExists=true");
            console.log(`status=${status}`);
            console.log(`type=${type}`);
            console.log(`totalAmount=${Number.isFinite(totalAmount) ? totalAmount : "invalid"}`);
            console.log(`currency=${currency}`);
            console.log(`paymentKeyPresent=${paymentKeyPresent}`);
            console.log(`orderIdMatches=${orderIdMatches}`);
            console.log(`customerKeyMatches=${customerKeyState}`);
            console.log(`approvedAtPresent=${approvedAtPresent}`);
            console.log(`cardPresent=${cardPresent}`);
            console.log(`cancelCount=${cancelCount}`);
            console.log(`failurePresent=${failurePresent}`);
            const approved =
              status === "DONE" &&
              type === "BILLING" &&
              totalAmount === 4900 &&
              currency === "KRW" &&
              paymentKeyPresent &&
              orderIdMatches;
            const result = approved
              ? "APPROVED_EXTERNALLY"
              : status !== "DONE"
                ? "NOT_APPROVED"
                : "INCONCLUSIVE";
            console.log(`RECONCILIATION_RESULT=${result}`);
          } else {
            const errorCode = safeToken(body?.code, httpStatus === 0 ? "TRANSPORT_ERROR" : "UNKNOWN_ERROR");
            const missing = httpStatus === 404;
            console.log(`paymentExists=${missing ? "false" : "unknown"}`);
            console.log(`tossErrorCode=${errorCode}`);
            console.log("maskedErrorSummary=Toss read-only lookup returned an error");
            console.log(`RECONCILIATION_RESULT=${missing ? "NOT_APPROVED" : "INCONCLUSIVE"}`);
          }
          NODE

      - name: Verify Staging D1 is unchanged
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          STAGING_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_STAGING_D1_DATABASE_ID }}
          GENERATED_CONFIG: ${{ runner.temp }}/wrangler.staging.reconcile.jsonc
          BASELINE_FILE: ${{ runner.temp }}/staging-ledger-baseline.safe.json
          AFTER_FILE: ${{ runner.temp }}/staging-ledger-after.safe.json
        run: |
          set -euo pipefail
          echo "::add-mask::$CLOUDFLARE_API_TOKEN"
          echo "::add-mask::$CLOUDFLARE_ACCOUNT_ID"
          echo "::add-mask::$STAGING_D1_DATABASE_ID"
          npx --yes wrangler@4.81.0 d1 execute on-my-way-billing-staging \
            --remote \
            --config "$GENERATED_CONFIG" \
            --command "SELECT (SELECT COUNT(*) FROM billing_accounts) AS accounts, (SELECT COUNT(*) FROM billing_orders) AS orders, (SELECT COUNT(*) FROM billing_orders WHERE status = 'failed') AS failed, (SELECT COUNT(*) FROM billing_orders WHERE status = 'succeeded') AS succeeded, (SELECT COUNT(*) FROM billing_orders WHERE payment_key IS NOT NULL) AS paymentKeys, (SELECT COUNT(*) FROM billing_events) AS events" \
            --json > "$AFTER_FILE"
          node <<'NODE'
          const fs = require("node:fs");
          const before = JSON.parse(fs.readFileSync(process.env.BASELINE_FILE, "utf8"));
          const payload = JSON.parse(fs.readFileSync(process.env.AFTER_FILE, "utf8"));
          const rows = (Array.isArray(payload) ? payload : [payload])
            .flatMap((item) => Array.isArray(item.results) ? item.results : []);
          if (rows.length !== 1) throw new Error("Unable to verify Staging ledger after Toss lookup");
          const after = Object.fromEntries(Object.entries(rows[0]).map(([key, value]) => [key, Number(value)]));
          for (const key of ["accounts", "orders", "failed", "succeeded", "paymentKeys", "events"]) {
            if (after[key] !== before[key]) throw new Error(`Staging ledger changed during read-only reconciliation: ${key}`);
          }
          if (
            after.accounts !== 1 ||
            after.orders !== 1 ||
            after.failed !== 1 ||
            after.succeeded !== 0 ||
            after.paymentKeys !== 0 ||
            after.events !== 3
          ) throw new Error("Staging ledger no longer matches the reviewed aggregate");
          console.log("d1Unchanged=true");
          console.log("accounts=1 orders=1 failed=1 succeeded=0 paymentKeys=0 events=3");
          NODE

      - name: Verify environment boundaries after reconciliation
        shell: bash
        env:
          STAGING_HEALTH_FILE: ${{ runner.temp }}/staging-health-after.json
          PRODUCTION_HEALTH_FILE: ${{ runner.temp }}/production-health-after.json
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --max-time 30 \
            --output "$STAGING_HEALTH_FILE" \
            "https://on-my-way-staging.jungslawyer.workers.dev/api/health"
          curl --fail --silent --show-error --max-time 30 \
            --output "$PRODUCTION_HEALTH_FILE" \
            "https://onmyway.olivenrich.com/api/health"
          node <<'NODE'
          const fs = require("node:fs");
          const staging = JSON.parse(fs.readFileSync(process.env.STAGING_HEALTH_FILE, "utf8"));
          const production = JSON.parse(fs.readFileSync(process.env.PRODUCTION_HEALTH_FILE, "utf8"));
          if (staging.environment !== "staging") throw new Error("Staging environment changed during reconciliation");
          if (staging.services?.accountStorage !== true) throw new Error("Staging account storage changed during reconciliation");
          if (staging.services?.payments !== false) throw new Error("Staging payments changed during reconciliation");
          if (production.services?.payments !== false) throw new Error("Production payments changed during reconciliation");
          console.log("stagingEnvironment=staging");
          console.log("stagingAccountStorage=true");
          console.log("stagingPayments=false");
          console.log("productionPayments=false");
          NODE

      - name: Remove reconciliation temporary files
        if: always()
        shell: bash
        run: |
          rm -f \
            "$RUNNER_TEMP/wrangler.staging.reconcile.jsonc" \
            "$RUNNER_TEMP/staging-health-before.json" \
            "$RUNNER_TEMP/production-health-before.json" \
            "$RUNNER_TEMP/staging-order-selection.raw.json" \
            "$RUNNER_TEMP/staging-order-selection.internal.json" \
            "$RUNNER_TEMP/staging-ledger-baseline.safe.json" \
            "$RUNNER_TEMP/toss-order-response.internal.json" \
            "$RUNNER_TEMP/staging-ledger-after.safe.json" \
            "$RUNNER_TEMP/staging-health-after.json" \
            "$RUNNER_TEMP/production-health-after.json"
