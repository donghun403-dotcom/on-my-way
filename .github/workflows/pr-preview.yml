name: PR Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: pr-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-and-preview:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out the pull request
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Check JavaScript syntax
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find . -type f \( -name '*.js' -o -name '*.mjs' -o -name '*.cjs' \) -not -path './node_modules/*' -print0)

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run Playwright against the CI server
        run: npm run test:e2e -- --reporter=line

      - name: Deploy the Cloudflare PR preview
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.81.0"
          command: deploy --config wrangler.preview.jsonc

      - name: Require a preview deployment URL
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: test -n "$PREVIEW_URL"

      - name: Run Playwright against the Cloudflare preview
        env:
          E2E_BASE_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: npm run test:e2e -- --reporter=line

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7
