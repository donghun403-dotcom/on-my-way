name: PR Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      verification_target:
        description: Verification target
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production-plan

concurrency:
  group: pr-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-and-preview:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out the pull request
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Check JavaScript syntax
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find . -type f \( -name '*.js' -o -name '*.mjs' -o -name '*.cjs' \) -not -path './node_modules/*' -print0)

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run Playwright against the CI server
        if: github.event_name != 'workflow_dispatch' || inputs.verification_target != 'production-plan'
        run: npm run test:e2e -- --reporter=line

      - name: Run Production Plan Playwright without deployment
        if: github.event_name == 'workflow_dispatch' && inputs.verification_target == 'production-plan'
        env:
          E2E_BASE_URL: https://onmyway.olivenrich.com
        run: npx playwright test tests/e2e/plan.spec.js tests/e2e/responsive.spec.js --reporter=line

      - name: Generate Preview Wrangler config
        if: github.event_name != 'workflow_dispatch' || inputs.verification_target != 'production-plan'
        shell: bash
        env:
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
        run: |
          test -n "${CLOUDFLARE_D1_DATABASE_ID:-}"
          test "$CLOUDFLARE_D1_DATABASE_ID" != "null"
          echo "::add-mask::$CLOUDFLARE_D1_DATABASE_ID"

          generated_config="$GITHUB_WORKSPACE/wrangler.preview.generated.jsonc"

          jq --arg database_id "$CLOUDFLARE_D1_DATABASE_ID" '
            .d1_databases = [{
              "binding": "BILLING_DB",
              "database_name": "on-my-way-billing-preview",
              "database_id": $database_id,
              "migrations_dir": "migrations"
            }] |
            .assets.exclude = ((.assets.exclude // []) + ["wrangler.preview.generated.jsonc"])
          ' wrangler.preview.jsonc > "$generated_config"

          test -s "$generated_config"

          jq -e '
            (.d1_databases | length == 1) and
            (.d1_databases[0].binding == "BILLING_DB") and
            (.d1_databases[0].database_name == "on-my-way-billing-preview") and
            (.d1_databases[0].database_id | type == "string") and
            (.d1_databases[0].database_id | length > 0)
          ' "$generated_config" > /dev/null

      - name: Deploy the Cloudflare PR preview
        if: github.event_name != 'workflow_dispatch' || inputs.verification_target != 'production-plan'
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.112.0"
          command: deploy --config wrangler.preview.generated.jsonc --name on-my-way-pr-${{ github.event.pull_request.number || 'manual' }}

      - name: Require a preview deployment URL
        if: github.event_name != 'workflow_dispatch' || inputs.verification_target != 'production-plan'
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: test -n "$PREVIEW_URL"

      - name: Wait for preview static assets
        if: github.event_name != 'workflow_dispatch' || inputs.verification_target != 'production-plan'
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.deployment-url }}
        shell: bash
        run: |
          consecutive=0
          last_result=""
          for attempt in {1..24}; do
            all_ready=1
            last_result=""
            endpoint_count=0
            while IFS='|' read -r path expected_type; do
              endpoint_count=$((endpoint_count + 1))
              if [ -z "$path" ] || [[ "$path" != /* ]]; then
                echo "Invalid readiness endpoint definition: path=$path type=$expected_type"
                exit 1
              fi
              case "$expected_type" in
                html|javascript|json) ;;
                *)
                  echo "Invalid readiness endpoint definition: path=$path type=$expected_type"
                  exit 1
                  ;;
              esac
              probe="$(curl --silent --output /dev/null --write-out '%{http_code}\t%{content_type}' --max-time 15 "$PREVIEW_URL$path" 2>/dev/null || true)"
              status="${probe%%$'\t'*}"
              content_type="${probe#*$'\t'}"
              case "$expected_type:$content_type" in
                html:text/html*) ;;
                javascript:*javascript*) ;;
                json:application/json*) ;;
                *) all_ready=0; last_result="$path status=$status content-type=$content_type" ;;
              esac
              if [ "$status" != "200" ]; then
                all_ready=0
                last_result="$path status=$status content-type=$content_type"
              fi
            done <<'ENDPOINTS'
          /app.html|html
          /script.js|javascript
          /plan-policy.mjs|javascript
          /api/health|json
          /api/auth/providers|json
          ENDPOINTS

            if [ "$endpoint_count" -ne 5 ]; then
              echo "Invalid readiness endpoint count: $endpoint_count"
              exit 1
            fi

            if [ "$all_ready" -eq 1 ]; then
              consecutive=$((consecutive + 1))
              if [ "$consecutive" -ge 2 ]; then
                exit 0
              fi
            else
              consecutive=0
            fi
            sleep 5
          done
          echo "Preview core assets did not become stable (last: $last_result)"
          exit 1

      - name: Run Playwright against the Cloudflare preview
        if: github.event_name != 'workflow_dispatch' || inputs.verification_target != 'production-plan'
        env:
          E2E_BASE_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: npm run test:e2e -- --reporter=line

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Remove generated Preview config
        if: always()
        shell: bash
        run: rm -f "$GITHUB_WORKSPACE/wrangler.preview.generated.jsonc"
