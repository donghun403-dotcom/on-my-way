name: PR Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: pr-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-and-preview:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out the pull request
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Check JavaScript syntax
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find . -type f \( -name '*.js' -o -name '*.mjs' -o -name '*.cjs' \) -not -path './node_modules/*' -print0)

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run Playwright against the CI server
        run: npm run test:e2e -- --reporter=line

      - name: Resolve Preview billing D1 binding
        id: billing_db
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          database_id="$(npx --yes wrangler@4.81.0 d1 list --json | jq -r '.[] | select(.name == "on-my-way-billing-preview") | .uuid')"
          test -n "$database_id"
          test "$database_id" != "null"
          echo "::add-mask::$database_id"
          generated_config="$GITHUB_WORKSPACE/wrangler.preview.generated.jsonc"
          jq --arg database_id "$database_id" '
            .d1_databases = [{
              "binding": "BILLING_DB",
              "database_name": "on-my-way-billing-preview",
              "database_id": $database_id,
              "migrations_dir": "migrations"
            }] |
            .assets.exclude = ((.assets.exclude // []) + ["wrangler.preview.generated.jsonc"])
          ' wrangler.preview.jsonc > "$generated_config"
          echo "config=$generated_config" >> "$GITHUB_OUTPUT"

      - name: Deploy the Cloudflare PR preview
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.81.0"
          command: deploy --config ${{ steps.billing_db.outputs.config }} --name on-my-way-pr-${{ github.event.pull_request.number || 'manual' }}

      - name: Require a preview deployment URL
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: test -n "$PREVIEW_URL"

      - name: Wait for preview static assets
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.deployment-url }}
        shell: bash
        run: |
          for attempt in {1..24}; do
            status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' "$PREVIEW_URL/plan-policy.mjs")"
            if [ "$status" = "200" ]; then
              exit 0
            fi
            sleep 5
          done
          echo "Preview /plan-policy.mjs did not become ready (last status: $status)"
          exit 1

      - name: Run Playwright against the Cloudflare preview
        env:
          E2E_BASE_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: npm run test:e2e -- --reporter=line

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7
