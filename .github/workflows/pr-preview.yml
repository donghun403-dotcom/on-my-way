name: PR Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: pr-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-and-preview:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out the pull request
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Check JavaScript syntax
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find . -type f \( -name '*.js' -o -name '*.mjs' -o -name '*.cjs' \) -not -path './node_modules/*' -print0)

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run Playwright against the CI server
        run: npm run test:e2e -- --reporter=line

      - name: Deploy the Cloudflare PR preview
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.81.0"
          command: deploy --config wrangler.preview.jsonc --name on-my-way-pr-${{ github.event.pull_request.number || 'manual' }}

      - name: Require a preview deployment URL
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: test -n "$PREVIEW_URL"

      - name: Wait for preview static assets
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.deployment-url }}
        shell: bash
        run: |
          consecutive=0
          last_result=""
          for attempt in {1..24}; do
            all_ready=1
            last_result=""
            while IFS=$'\t' read -r path expected_type; do
              probe="$(curl --silent --output /dev/null --write-out '%{http_code}\t%{content_type}' --max-time 15 "$PREVIEW_URL$path" 2>/dev/null || true)"
              status="${probe%%$'\t'*}"
              content_type="${probe#*$'\t'}"
              case "$expected_type:$content_type" in
                html:text/html*) ;;
                javascript:*javascript*) ;;
                json:application/json*) ;;
                *) all_ready=0; last_result="$path status=$status content-type=$content_type"; break ;;
              esac
              if [ "$status" != "200" ]; then
                all_ready=0
                last_result="$path status=$status content-type=$content_type"
                break
              fi
            done <<'ENDPOINTS'
          /app.html\thtml
          /script.js\tjavascript
          /plan-policy.mjs\tjavascript
          /api/health\tjson
          /api/auth/providers\tjson
          ENDPOINTS

            if [ "$all_ready" -eq 1 ]; then
              consecutive=$((consecutive + 1))
              if [ "$consecutive" -ge 2 ]; then
                exit 0
              fi
            else
              consecutive=0
            fi
            sleep 5
          done
          echo "Preview core assets did not become stable (last: $last_result)"
          exit 1

      - name: Run Playwright against the Cloudflare preview
        env:
          E2E_BASE_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: npm run test:e2e -- --reporter=line

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7
